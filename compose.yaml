services:
  hardcopy:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - hardcopy-data:/app/data
    # --- USB printer only: uncomment and pin this service to the node
    # --- that has the printer plugged in. Add a host udev rule for perms.
    # devices:
    #   - /dev/bus/usb:/dev/bus/usb
    healthcheck:
      test: ["CMD", "python", "-c", "import pathlib,sys; sys.exit(0 if pathlib.Path('/app/data/hardcopy.db').exists() else 1)"]
      interval: 60s
      retries: 3

volumes:
  hardcopy-data:
